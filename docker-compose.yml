version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: planejamento_ia_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-planejamento_ia}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount sql dumps to init db automatically on first run
      # Note: execution order is alphabetical.
      #- ./sistemas/banco_de_dados:/docker-entrypoint-initdb.d
    networks:
      - planeja_net

networks:
  planeja_net:
    driver: bridge

volumes:
  postgres_data:
